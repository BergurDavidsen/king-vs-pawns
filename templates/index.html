<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chess Variant — Analysis</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#1a1a18" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"
    />

    <style>
      :root {
        --bg-deep: #1a1a18;
        --bg-page: #21201d;
        --surface: #302e2b;
        --surface-raised: #3d3a36;
        --border: #474441;
        --border-subtle: rgba(255, 255, 255, 0.06);
        --text: #c3c1bd;
        --text-muted: #8b8987;
        --text-bright: #f0f0f0;
        --accent: #81b64c;
        --accent-dim: rgba(129, 182, 76, 0.22);
        --blue: #3d70ce;
        --blue-dim: rgba(75, 129, 232, 0.2);
        --danger: #e03838;
        --eval-pct: 50%;
        --board-frame: #262421;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu,
          "Helvetica Neue", sans-serif;
        background: var(--bg-page);
        color: var(--text);
        font-size: 14px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background: var(--bg-deep);
        border-bottom: 1px solid var(--border-subtle);
      }

      .app-header h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-bright);
        letter-spacing: 0.02em;
      }

      .app-header .tag {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
      }

      .container {
        display: flex;
        gap: 0;
        padding: 16px 20px 24px;
        max-width: 1280px;
        margin: 0 auto;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 14px 16px;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .panel-left {
        width: 260px;
        margin-right: 16px;
      }

      .panel-right {
        width: 300px;
        margin-left: 16px;
        min-height: 120px;
      }

      .panel .title {
        color: var(--text-muted);
        font-weight: 600;
        margin: 0 0 12px;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      #status {
        margin: 0 0 14px;
        padding: 10px 12px;
        background: var(--bg-deep);
        border-radius: 4px;
        text-align: center;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-bright);
        border: 1px solid var(--border-subtle);
        border-left: 3px solid var(--blue);
      }

      #status .winner {
        color: var(--accent);
      }

      .control-section {
        margin-bottom: 16px;
      }

      .control-section:last-child {
        margin-bottom: 0;
      }

      .section-label {
        font-size: 0.62rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        margin: 0 0 8px;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .controls-grid.single {
        grid-template-columns: 1fr;
      }

      button {
        margin: 0;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: linear-gradient(180deg, var(--surface-raised) 0%, var(--surface) 100%);
        color: var(--text-bright);
        font-weight: 600;
        font-size: 0.8rem;
        cursor: pointer;
        
      }

      button:hover {
        background: var(--surface-raised);
       
      }

      button:active {
        transform: translateY(1px);
      }

      button.primary {
        background: linear-gradient(180deg, #5a8eef 0%, var(--blue) 100%);
        border-color: #6a9af0;
      }

      button.primary:hover {
        background: #5a8eef;
      }

      button.danger {
        background: linear-gradient(180deg, #e87070 0%, var(--danger) 100%);
        border-color: #e87070;
      }

      button.danger:hover {
        background: #e87070;
      }

      button#analysisBtn.engine-on {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--accent);
      }

      .board-column {
        flex: 1;
        min-width: 280px;
        max-width: min(72vmin, 760px);
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 10px;
      }

      .eval-rail {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .eval-track {
        flex: 1;
        width: 22px;
        min-height: 180px;
        background: #0d0d0c;
        border-radius: 4px;
        border: 1px solid var(--border);
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-self: stretch;
      }

      #evalbar {
        width: 100%;
        height: var(--eval-pct);
        min-height: 0;
        background: linear-gradient(180deg, #f5f5f5 0%, #d8d8d8 100%);
        transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 0 0 3px 3px;
      }

      #eval-text-inside {
        font-size: 0.72rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--text-bright);
        text-align: center;
        min-width: 2.5rem;
        padding: 4px 6px;
        background: var(--bg-deep);
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      #board-container {
        position: relative;
        flex: 1;
        border-radius: 4px;
        padding: 8px;
        background: var(--board-frame);
        border: 1px solid var(--border);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      }

      #board {
        width: 100%;
        border-radius: 3px;
        overflow: hidden;
      }

      .selected-square {
        background: rgba(129, 182, 76, 0.45) !important;
      }

      .highlight {
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.35) 22%,
          transparent 28%
        ) !important;
      }

      /* Engine panel (lichess / chess.com style) */
      .best-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px 12px;
        margin-bottom: 12px;
        background: var(--bg-deep);
        border-radius: 4px;
        border: 1px solid var(--border-subtle);
      }

      .best-row .label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        font-weight: 600;
      }

      #bestMove {
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas,
          monospace;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--accent);
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 0.85rem;
      }

      .stat-row:last-of-type {
        border-bottom: none;
      }

      .stat-row .k {
        color: var(--text-muted);
      }

      #eval {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-weight: 600;
        color: var(--text-bright);
      }

      .lines-header {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        font-weight: 600;
        margin: 14px 0 8px;
      }

      #lines {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: min(42vh, 420px);
        overflow-y: auto;
        padding-right: 4px;
      }

      #lines::-webkit-scrollbar {
        width: 6px;
      }

      #lines::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      .pv-line {
        display: grid;
        grid-template-columns: 22px 52px 1fr;
        gap: 8px;
        align-items: start;
        padding: 6px 8px;
        border-radius: 4px;
        background: var(--bg-deep);
        border: 1px solid transparent;
        font-size: 0.78rem;
        line-height: 1.35;
      }

      .pv-line.pv-best {
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      .pv-idx {
        color: var(--text-muted);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .pv-score {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-weight: 600;
        color: var(--blue);
        text-align: right;
      }

      .pv-moves {
        font-family: ui-monospace, Menlo, Consolas, monospace;
        color: var(--text);
        word-break: break-word;
      }

      #overlay {
        position: absolute;
        inset: 8px;
        background: rgba(26, 26, 24, 0.72);
        backdrop-filter: blur(4px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
        color: var(--text-bright);
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 3px;
      }

      #analysis.panel-hidden {
        display: none;
      }

      @media (max-width: 960px) {
        .container {
          flex-direction: column;
          padding: 12px;
        }

        .panel-left,
        .panel-right {
          width: 100%;
          margin: 0;
        }

        .panel-left {
          order: 2;
        }

        .board-column {
          order: 1;
          max-width: 100%;
          width: 100%;
          flex-direction: column;
        }

        .eval-rail {
          flex-direction: row;
          width: 100%;
          align-items: center;
        }

        .eval-track {
          flex: 1;
          width: auto;
          min-height: 14px;
          height: 14px;
          flex-direction: row;
          justify-content: flex-start;
          align-items: stretch;
        }

        #evalbar {
          height: 100%;
          width: var(--eval-pct);
          border-radius: 0 3px 3px 0;
        }

        #eval-text-inside {
          flex-shrink: 0;
        }

        .panel-right {
          order: 3;
        }
      }

      @media (max-width: 520px) {
        .controls-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header class="app-header">
      <h1>Chess variant</h1>
      <span class="tag">Analysis</span>
    </header>

    <div class="container">
      <aside class="panel panel-left">
        <div class="title">Game</div>
        <div id="status">Waiting...</div>

        <div class="control-section">
          <div class="section-label">Play as</div>
          <div class="controls-grid">
            <button type="button" class="primary" onclick="pickSide(2)">
              Play as King
            </button>
            <button type="button" class="primary" onclick="pickSide(1)">
              Play as Pawns
            </button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-label">Mode</div>
          <div class="controls-grid single">
            <button type="button" onclick="pickSide('pvp')">PvP</button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-label">Moves</div>
          <div class="controls-grid single">
            <button type="button" onclick="undoMove()">Undo move</button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-label">Analysis</div>
          <div class="controls-grid">
            <button type="button" id="analysisBtn" onclick="toggleAnalysis()">
              Engine
            </button>
            <button type="button" id="evalBarBtn" onclick="toggleEvalBar()">
              Eval bar
            </button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-label">Board</div>
          <div class="controls-grid single">
            <button type="button" class="danger" onclick="reset_board()">
              Reset game
            </button>
          </div>
        </div>
      </aside>

      <div class="board-column">
        <div class="eval-rail" id="eval-rail-main">
          <div class="eval-track">
            <div id="evalbar"></div>
          </div>
          <div id="eval-text-inside">0.0</div>
        </div>
        <div id="board-container">
          <div id="board"></div>
          <svg
            id="arrow-layer"
            width="500"
            height="500"
            style="
              position: absolute;
              top: 8px;
              left: 8px;
              pointer-events: none;
              z-index: 10;
            "
          ></svg>
          <div id="overlay">Thinking…</div>
        </div>
      </div>

      <aside id="analysis" class="panel panel-right panel-hidden">
        <div class="title">Engine</div>
        <div class="best-row">
          <span class="label">Best</span>
          <span id="bestMove">—</span>
        </div>
        <div class="stat-row">
          <span class="k">Evaluation</span>
          <span id="eval">0.0</span>
        </div>
        <div class="lines-header">Lines</div>
        <div id="lines"></div>
      </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
      let humanSide = null;
      let gameOver = false;
      let analysisVisible = false;
      let evalBarVisible = true;
      let selectedSquare = null;

      function pieceTheme(piece) {
        return (
          "https://chessboardjs.com/img/chesspieces/wikipedia/" + piece + ".png"
        );
      }
      function reset_board() {
        location.reload();
      }
      function toSquare(pos) {
        return String.fromCharCode(97 + pos[0]) + (pos[1] + 1);
      }

      function removeHighlights() {
        document.querySelectorAll("[data-square]").forEach((el) => {
          el.classList.remove("selected-square");
          el.classList.remove("highlight");
        });

        selectedSquare = null;
      }

      function makeMove(source, target) {
        if (!source || !target || source === target) return;

        document.getElementById("overlay").style.display = "flex";
        fetch("/move", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            from: [source.charCodeAt(0) - 97, parseInt(source[1]) - 1],
            to: [target.charCodeAt(0) - 97, parseInt(target[1]) - 1],
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            updateUI(data);
            removeHighlights();
          })
          .catch(() => {
            document.getElementById("overlay").style.display = "none";
            removeHighlights();
          });
      }

      function undoMove() {
        fetch("/undo", {
          method: "POST",
        })
          .then((res) => res.json())
          .then((data) => {
            gameOver = false;
            updateUI(data);
            removeHighlights();
          })
          .catch(() => {
            removeHighlights();
          });
      }

      function renderLines(lines) {
        const container = document.getElementById("lines");
        container.innerHTML = "";
        if (!lines || !analysisVisible) return;
        lines.forEach((l, i) => {
          const moves = l.line
            .map((m) => `${toSquare(m[0])}${toSquare(m[1])}`)
            .join(" ");
          const div = document.createElement("div");
          div.className = "pv-line" + (i === 0 ? " pv-best" : "");
          const idx = document.createElement("span");
          idx.className = "pv-idx";
          idx.textContent = i + 1 + ".";
          const score = document.createElement("span");
          score.className = "pv-score";
          score.textContent = l.value;
          const mv = document.createElement("span");
          mv.className = "pv-moves";
          mv.textContent = moves;
          div.appendChild(idx);
          div.appendChild(score);
          div.appendChild(mv);
          container.appendChild(div);
        });
      }

      function updateEvalUI(score, evalText) {
        const clampedScore = Math.max(-100, Math.min(100, score));
        const pct = ((clampedScore + 100) / 200) * 100;
        document.documentElement.style.setProperty(
          "--eval-pct",
          pct + "%"
        );

        const textLabel = document.getElementById("eval-text-inside");
        textLabel.textContent = evalText;

        const heightPct = pct;
        if (heightPct > 52) {
          textLabel.style.color = "#1a1a18";
          textLabel.style.background = "#e8e8e8";
        } else {
          textLabel.style.color = "var(--text-bright)";
          textLabel.style.background = "var(--bg-deep)";
        }

        if (analysisVisible) {
          document.getElementById("eval").textContent = evalText;
        }
      }

      function highlightSquares(squares) {
        squares.forEach((pos) => {
          const square = toSquare(pos);

          const el = document.querySelector(`[data-square="${square}"]`);
          if (el) el.classList.add("highlight");
        });
      }

      const board = Chessboard("board", {
        draggable: false,
        pieceTheme: pieceTheme,
        onDragStart: function (source, piece) {
          if (gameOver || humanSide === null) return false;
          if (humanSide !== "pvp") {
            if (
              (humanSide === 2 && piece.search(/^b/) !== -1) ||
              (humanSide === 1 && piece.search(/^w/) !== -1)
            )
              return false;
          }
          removeHighlights();
        },
        onDrop: function (source, target) {
          if (source === target || target === "offboard") return;
          makeMove(source, target);
        },
        onSnapEnd: function () {
          board.position(board.fen());
        },
      });

      let lastTapTime = 0;

      function handleSquareClick() {
        const now = Date.now();

        if (now - lastTapTime < 120) return;
        lastTapTime = now;

        if (gameOver || humanSide === null) return;

        const square = $(this).attr("data-square");
        const piece = board.position()[square];

        const x = square.charCodeAt(0) - 97;
        const y = parseInt(square[1]) - 1;

        if (selectedSquare === square) {
          removeHighlights();
          return;
        }

        if (selectedSquare) {
          if (piece) {
            const isWhite = piece.startsWith("w");

            const canSelect =
              humanSide === "pvp" ||
              (humanSide === 2 && isWhite) ||
              (humanSide === 1 && !isWhite);

            if (canSelect) {
              removeHighlights();
              selectedSquare = square;

              document
                .querySelector(`[data-square="${square}"]`)
                ?.classList.add("selected-square");

              fetch("/legal_moves", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pos: [x, y] }),
              })
                .then((res) => res.json())
                .then((data) => {
                  if (!data.moves) return;
                  highlightSquares(data.moves);
                });

              return;
            }
          }

          makeMove(selectedSquare, square);
          return;
        }

        if (piece) {
          const isWhite = piece.startsWith("w");

          const canSelect =
            humanSide === "pvp" ||
            (humanSide === 2 && isWhite) ||
            (humanSide === 1 && !isWhite);

          if (!canSelect) return;

          removeHighlights();
          selectedSquare = square;

          document
            .querySelector(`[data-square="${square}"]`)
            ?.classList.add("selected-square");

          fetch("/legal_moves", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pos: [x, y] }),
          })
            .then((res) => res.json())
            .then((data) => {
              if (!data.moves) return;
              highlightSquares(data.moves);
            });
        }
      }

      let isTouch = false;

      $("#board")
        .on("touchstart", "[class*='square-']", function (e) {
          isTouch = true;
          handleSquareClick.call(this, e);
        })
        .on("mousedown", "[class*='square-']", function (e) {
          if (isTouch) return;
          handleSquareClick.call(this, e);
        });

      window.addEventListener("resize", () => board.resize());

      function drawArrow(from, to) {
        if (!analysisVisible) return;
        const boardEl = document.getElementById("board");
        const svg = document.getElementById("arrow-layer");

        const bWidth = boardEl.offsetWidth;
        const bHeight = boardEl.offsetHeight;
        svg.setAttribute("width", bWidth);
        svg.setAttribute("height", bHeight);

        if (bWidth === 0) return;

        const sqSize = bWidth / 8;

        const fx = from[0] * sqSize + sqSize / 2;
        const fy = (7 - from[1]) * sqSize + sqSize / 2;
        const tx = to[0] * sqSize + sqSize / 2;
        const ty = (7 - to[1]) * sqSize + sqSize / 2;

        svg.innerHTML = `
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7"
              refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="rgba(129, 182, 76, 0.92)" />
      </marker>
    </defs>
    <line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}"
          stroke="rgba(129, 182, 76, 0.88)" stroke-width="9"
          marker-end="url(#arrowhead)" />
  `;
      }

      function pickSide(side) {
        document.getElementById("overlay").style.display = "flex";
        fetch("/select_side", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ side: side }),
        })
          .then((res) => res.json())
          .then(updateUI);
      }

      function updateUI(data) {
        board.position(data.fen);
        humanSide = data.human_side;
        const status = document.getElementById("status");
        if (data.winner !== 0) {
          gameOver = true;
          status.innerHTML = `<span class="winner">${data.winner > 0 ? "King wins" : "Pawns win"}</span>`;
          document.getElementById("arrow-layer").innerHTML = "";
        } else {
          status.textContent =
            humanSide === "pvp"
              ? data.turn === 2
                ? "King to move"
                : "Pawns to move"
              : data.turn === humanSide
                ? "Your move"
                : "Thinking…";
        }
        document.getElementById("overlay").style.display = "none";
        updateEvaluation();
      }

      function syncEvalBarVisibility() {
        const rail = document.getElementById("eval-rail-main");
        const btn = document.getElementById("evalBarBtn");
        rail.style.display = evalBarVisible ? "" : "none";
        btn.textContent = evalBarVisible ? "Hide eval bar" : "Show eval bar";
      }

      function toggleEvalBar() {
        evalBarVisible = !evalBarVisible;
        syncEvalBarVisibility();
      }

      function toggleAnalysis() {
        analysisVisible = !analysisVisible;
        const panel = document.getElementById("analysis");
        const btn = document.getElementById("analysisBtn");

        if (analysisVisible) {
          panel.classList.remove("panel-hidden");
          btn.textContent = "Hide engine";
          btn.classList.add("engine-on");
          updateEvaluation();
        } else {
          panel.classList.add("panel-hidden");
          btn.textContent = "Engine";
          btn.classList.remove("engine-on");
          document.getElementById("arrow-layer").innerHTML = "";
          document.getElementById("lines").innerHTML = "";
        }
      }

      function updateEvaluation() {
        fetch("/evaluate")
          .then((res) => res.json())
          .then((data) => {
            updateEvalUI(data.evaluation, data.eval_text);

            if (analysisVisible) {
              if (data.best_move && !gameOver) {
                document.getElementById("bestMove").textContent =
                  `${toSquare(data.best_move[0])} → ${toSquare(data.best_move[1])}`;
                drawArrow(data.best_move[0], data.best_move[1]);
              } else {
                document.getElementById("arrow-layer").innerHTML = "";
                document.getElementById("bestMove").textContent = "—";
              }
              renderLines(data.lines);
            }
          });
      }

      syncEvalBarVisibility();
    </script>
  </body>
</html>
