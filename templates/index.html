<!doctype html>
<html>
  <head>
    <title>Chess Variant | Engine</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />

    <style>
      :root {
        --bg-color: #161512;
        --panel-bg: #262421;
        --accent-blue: #4a6ee0;
        --accent-green: #789922;
        --accent-red: #da3434;
        --text-main: #bababa;
        --text-bright: #ffffff;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        display: flex;
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        width: 100%;
        justify-content: center;
      }

      .panel {
        background: var(--panel-bg);
        padding: 20px;
        border-radius: 4px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        width: 280px;
        display: flex;
        flex-direction: column;
      }

      .title {
        color: var(--text-bright);
        font-weight: 600;
        margin-bottom: 20px;
        font-size: 1.2em;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      button {
        display: block;
        width: 100%;
        margin-bottom: 10px;
        padding: 12px;
        border: none;
        border-radius: 4px;
        background: #3c3a37;
        color: var(--text-bright);
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button:hover { background: #454340; transform: translateY(-1px); }
      button.primary { background: var(--accent-blue); }
      button.success { background: var(--accent-green); }
      button.danger { background: var(--accent-red); margin-top: auto; }

      #board-container {
        position: relative;
        background: #2b2b2b;
        padding: 10px;
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      }

      #board { width: 500px; }

      #overlay {
        position: absolute;
        top: 10px; left: 10px;
        width: 500px; height: 500px;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        color: white;
        z-index: 100;
      }

      #status {
        margin: 15px 0;
        padding: 10px;
        background: #312e2b;
        border-radius: 4px;
        text-align: center;
        font-weight: bold;
      }

      .winner { color: #f0d9b5; font-size: 1.2em; }

      /* Eval Bar Styling */
      #eval-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
      }

      #evalbar-container {
        width: 35px; /* Slightly wider for text */
        height: 300px;
        background: #403d39; /* Black side */
        border-radius: 2px;
        overflow: hidden;
        position: relative;
        border: 2px solid #222;
      }

      #evalbar {
        width: 100%;
        height: 50%;
        background: white; /* King side */
        position: absolute;
        bottom: 0;
        transition: height 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      }

      #eval-text-inside {
        position: absolute;
        width: 100%;
        text-align: center;
        font-weight: bold;
        font-size: 0.75rem;
        z-index: 5;
        /* Positioned based on king/pawn dominance via JS */
        bottom: 50%; 
        transition: bottom 0.6s, color 0.3s;
        color: #fff;
        pointer-events: none;
      }

      .analysis-item { margin-bottom: 12px; font-size: 0.95em; }
      #eval { font-weight: bold; color: var(--text-bright); }
      #bestMove { color: var(--accent-green); font-family: monospace; font-size: 1.1em; }

      #lines div {
        background: #312e2b;
        margin-top: 5px;
        padding: 5px;
        border-radius: 3px;
        font-size: 0.85em;
        font-family: monospace;
      }

      .highlight {
        box-shadow: inset 0 0 3px 3px rgba(255, 255, 255, 0.5);
        background: radial-gradient(circle, rgba(255,255,255,0.3) 20%, transparent 50%);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="panel">
        <div class="title">Controls</div>
        <button class="primary" onclick="pickSide(2)">Play as King</button>
        <button class="primary" onclick="pickSide(1)">Play as Pawns</button>
        <button class="success" onclick="pickSide('pvp')">PvP Mode</button>
        <button id="analysisBtn" onclick="toggleAnalysis()">Show Engine</button>
        <button id="evalBarBtn" onclick="toggleEvalBar()">Hide Eval Bar</button>
        
        <div id="status">Waiting...</div>

        <div id="eval-wrapper">
            <div id="evalbar-container">
              <div id="eval-text-inside">0.0</div>
              <div id="evalbar"></div>
            </div>
            <span>EVAL</span>
        </div>

        <button class="danger" onclick="reset_board()">Reset</button>
      </div>

      <div id="board-container">
        <div id="board"></div>
        <svg id="arrow-layer" width="500" height="500" style="position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10;"></svg>
        <div id="overlay">Thinking...</div>
      </div>

      <div id="analysis" class="panel" style="visibility: hidden">
        <div class="title">Engine Details</div>
        <div class="analysis-item">Score: <span id="eval">0.0</span></div>
        <div class="analysis-item">Best: <span id="bestMove">-</span></div>
        <div class="analysis-item">
          Lines:
          <div id="lines"></div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
      let humanSide = null;
      let gameOver = false;
      let analysisVisible = false;
      let evalBarVisible = true;

      function pieceTheme(piece) { return "https://chessboardjs.com/img/chesspieces/wikipedia/" + piece + ".png"; }
      function reset_board() { location.reload(); }
      function toSquare(pos) { return String.fromCharCode(97 + pos[0]) + (pos[1] + 1); }

      function renderLines(lines) {
        const container = document.getElementById("lines");
        container.innerHTML = "";
        if(!lines || !analysisVisible) return;
        lines.forEach((l, i) => {
          const moves = l.line.map((m) => `${toSquare(m[0])}${toSquare(m[1])}`).join(" ");
          const div = document.createElement("div");
          div.innerText = `[${l.value}] ${moves}`;
          container.appendChild(div);
        });
      }

      function updateEvalUI(score, evalText) {
        // 1. Update the Bar Height
        const clampedScore = Math.max(-100, Math.min(100, score));
        const percent = (clampedScore + 100) / 200;
        const heightPercent = percent * 100;
        document.getElementById("evalbar").style.height = heightPercent + "%";

        // 2. Update the Text Inside Bar
        const textLabel = document.getElementById("eval-text-inside");
        textLabel.innerText = evalText;
        
        // Position text: if king is winning (>50% white), put text in the white part, else in dark
        if (heightPercent > 50) {
            textLabel.style.bottom = "10px";
            textLabel.style.color = "#000";
        } else {
            textLabel.style.bottom = "calc(100% - 25px)";
            textLabel.style.color = "#fff";
        }

        // 3. Update the Analysis Panel if visible
        if (analysisVisible) {
            document.getElementById("eval").innerText = evalText;
        }
      }

      function highlightSquares(squares) {
        squares.forEach((pos) => {
          const square = toSquare(pos);
          const el = document.querySelector(`.square-${square}`);
          if (el) el.classList.add("highlight");
        });
      }

      const board = Chessboard("board", {
        draggable: true,
        pieceTheme: pieceTheme,
        onDragStart: function (source, piece) {
          if (gameOver || humanSide === null) return false;
          if (humanSide !== "pvp") {
            if ((humanSide === 2 && piece.search(/^b/) !== -1) ||
                (humanSide === 1 && piece.search(/^w/) !== -1)) return false;
          }
        },
        onMouseoverSquare: function (square) {
          const x = square.charCodeAt(0) - 97;
          const y = parseInt(square[1]) - 1;
          fetch("/legal_moves", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pos: [x, y] }),
          }).then(res => res.json()).then(data => {
            document.querySelectorAll('.square-55d63').forEach(s => s.classList.remove('highlight'));
            highlightSquares(data.moves);
          });
        },
        onMouseoutSquare: () => document.querySelectorAll('.square-55d63').forEach(s => s.classList.remove('highlight')),
        onDrop: function (source, target) {
          document.getElementById("overlay").style.display = "flex";
          fetch("/move", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              from: [source.charCodeAt(0) - 97, parseInt(source[1]) - 1],
              to: [target.charCodeAt(0) - 97, parseInt(target[1]) - 1],
            }),
          }).then(res => res.json()).then(updateUI);
        },
      });

      function drawArrow(from, to) {
        if (!analysisVisible) return;
        const svg = document.getElementById("arrow-layer");
        svg.innerHTML = `<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="rgba(110, 224, 74, 0.8)" /></marker></defs>`;
        const sqSize = 500 / 8;
        const fx = from[0] * sqSize + sqSize / 2;
        const fy = (7 - from[1]) * sqSize + sqSize / 2;
        const tx = to[0] * sqSize + sqSize / 2;
        const ty = (7 - to[1]) * sqSize + sqSize / 2;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", fx); line.setAttribute("y1", fy);
        line.setAttribute("x2", tx); line.setAttribute("y2", ty);
        line.setAttribute("stroke", "rgba(110, 224, 74, 0.8)");
        line.setAttribute("stroke-width", "8");
        line.setAttribute("marker-end", "url(#arrowhead)");
        svg.appendChild(line);
      }

      function pickSide(side) {
        document.getElementById("overlay").style.display = "flex";
        fetch("/select_side", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ side: side }),
        }).then(res => res.json()).then(updateUI);
      }

      function updateUI(data) {
        board.position(data.fen);
        humanSide = data.human_side;
        const status = document.getElementById("status");
        if (data.winner !== 0) {
          gameOver = true;
          status.innerHTML = `<span class="winner">${data.winner > 0 ? "King Wins!" : "Pawns Win!"}</span>`;
          document.getElementById("arrow-layer").innerHTML = "";
        } else {
          status.innerText = humanSide === "pvp" ? (data.turn === 2 ? "King's turn" : "Pawns' turn") : (data.turn === humanSide ? "Your turn" : "AI Thinking...");
        }
        document.getElementById("overlay").style.display = "none";
        // Always trigger evaluation, but the function handles visibility checks
        updateEvaluation();
      }

      function toggleEvalBar() {
        evalBarVisible = !evalBarVisible;
        const wrapper = document.getElementById("eval-wrapper");
        const btn = document.getElementById("evalBarBtn");
        wrapper.style.display = evalBarVisible ? "flex" : "none";
        btn.innerText = evalBarVisible ? "Hide Eval Bar" : "Show Eval Bar";
      }

      function toggleAnalysis() {
        analysisVisible = !analysisVisible;
        const panel = document.getElementById("analysis");
        const btn = document.getElementById("analysisBtn");
        
        if (analysisVisible) {
          panel.style.visibility = "visible";
          btn.innerText = "Hide Engine";
          updateEvaluation();
        } else {
          panel.style.visibility = "hidden";
          btn.innerText = "Show Engine";
          document.getElementById("arrow-layer").innerHTML = "";
          document.getElementById("lines").innerHTML = "";
        }
      }

      function updateEvaluation() {
        fetch("/evaluate").then(res => res.json()).then(data => {
            // ALWAYS update the bar data in the background
            updateEvalUI(data.evaluation, data.eval_text);

            // ONLY update these if Analysis is visible
            if (analysisVisible) {
                if (data.best_move && !gameOver) {
                  document.getElementById("bestMove").innerText = `${toSquare(data.best_move[0])} → ${toSquare(data.best_move[1])}`;
                  drawArrow(data.best_move[0], data.best_move[1]);
                } else {
                  document.getElementById("arrow-layer").innerHTML = "";
                  document.getElementById("bestMove").innerText = "-";
                }
                renderLines(data.lines);
            }
        });
      }
    </script>
  </body>
</html>
